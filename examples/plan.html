<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Example plan</title>
    <style>
      body { max-width: 760px; margin: 40px auto; padding: 0 20px; font: 16px/1.5 system-ui, sans-serif; color: #222; }

      h1, h2 { line-height: 1.2; }

  <body data-review-kicker="PLAN DISCUSSION">

      <h2>1. First step</h2>
      <p>Describe the first step in plain language.</p>
    </section>
    <section data-review-id="step-2" data-review-kind="direction">
      <h2>2. Second step</h2>
      <p>Describe the second step in plain language.</p>
    </section>
    <section data-review-id="decision-1" data-review-kind="decision">
      <h2>Decision</h2>
      <p>Choose the preferred implementation approach.</p>
    </section>
  </body>
</html>
